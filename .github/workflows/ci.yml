name: CI

on:
  pull_request:
    branches: [main, develop]
  # Also run on direct pushes to the protected branches so their status (and the
  # Codecov base for diff coverage) is always current.
  push:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test with coverage
        # -coverpkg=./... measures coverage across all packages combined, so the
        # uploaded profile reflects the whole module, not just each package's own
        # tests. Codecov then derives both project and patch coverage from it.
        run: go test ./... -race -coverpkg=./... -coverprofile=coverage.out

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.out
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
